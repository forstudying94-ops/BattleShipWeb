databases:
  - name: battleshipweb-db
    databaseName: battleshipweb
    user: battleshipweb
    plan: free

services:
  - type: web
    name: battleshipweb
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: battleshipweb-db
          property: connectionString
      - key: ConnectionStrings__Default
        fromDatabase:
          name: battleshipweb-db
          property: connectionString
