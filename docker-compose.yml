services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      ConnectionStrings__Default: Host=db;Port=5432;Database=battleshipweb;Username=battleshipweb;Password=battleshipweb
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: battleshipweb
      POSTGRES_USER: battleshipweb
      POSTGRES_PASSWORD: battleshipweb
    ports:
      - "5432:5432"
    volumes:
      - battleshipweb-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battleshipweb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  battleshipweb-db:
